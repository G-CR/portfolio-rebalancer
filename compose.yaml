services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"

  api:
    build:
      context: ./backend
      target: development
    command: sh -c "uv run alembic upgrade head && exec uv run --no-sync uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - secret_data:/run/portfolio-secrets

  worker:
    build:
      context: ./backend
      target: development
    command: sleep infinity
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - secret_data:/run/portfolio-secrets

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portfolio}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  secret_data:
